{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:500px">
  <div class="card shadow">
    <div class="card-body">
      <h4 class="mb-4 text-center">Alterar Senha</h4>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100">
          Salvar nova senha
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
