{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
<h4>Usuários</h4>
<a href="{% url 'accounts:usuario_create' %}" class="btn btn-primary mb-2">Novo</a>
<table class="table table-bordered">
<tr><th>Usuário</th><th>Tipo</th><th>Status</th><th>Ações</th></tr>
{% for u in usuarios %}
<tr>
<td>{{ u.username }}</td>
<td>{{ u.perfilusuario.tipo }}</td>
<td>{{ u.is_active|yesno:"Ativo,Inativo" }}</td>
<td>
<a href="{% url 'accounts:usuario_update' u.id %}" class="btn btn-sm btn-warning">Editar</a>
<a href="{% url 'accounts:usuario_toggle' u.id %}" class="btn btn-sm btn-secondary">Ativar/Desativar</a>
</td>
</tr>
{% endfor %}
</table>
</div>
{% endblock %}
