{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary"><i class="bi bi-list-check"></i> Tipos de Transação</h2>
        <div>
            <a href="{% url 'cal:tipo_create' %}" class="btn btn-success btn-sm"><i class="bi bi-plus-circle"></i> Novo Tipo</a>
            <a href="{% url 'cal:calendar' %}" class="btn btn-outline-secondary btn-sm">Voltar</a>
        </div>
    </div>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for tipo in tipos %}
            <tr>
                <td>{{ tipo.descricao }}</td>
                <td>
                    <a href="{% url 'cal:tipo_update' tipo.pk %}" class="btn btn-sm btn-warning">Editar</a>
                    <a href="{% url 'cal:tipo_delete' tipo.pk %}" class="btn btn-sm btn-danger">Excluir</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="2">Nenhum tipo cadastrado.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
